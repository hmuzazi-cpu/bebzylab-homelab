<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="1100" height="780" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="imacGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13181f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="utmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141c27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wazuhVmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="winVmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eventGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1f00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f1500;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4493f8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f78166"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#e6edf3" filter="url(#subtleGlow)">Wazuh SIEM Home Lab — Architecture</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#7d8590">bebzylab.local · UTM on Late 2015 iMac · 192.168.64.0/24</text>

  <!-- ── iMac outer frame ── -->
  <rect x="30" y="75" width="1040" height="590" rx="14" ry="14" fill="url(#imacGrad)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- iMac label -->
  <rect x="30" y="75" width="1040" height="34" rx="14" ry="14" fill="#21262d"/>
  <rect x="30" y="95" width="1040" height="14" fill="#21262d"/>
  <circle cx="52" cy="92" r="6" fill="#ff5f57"/>
  <circle cx="72" cy="92" r="6" fill="#febc2e"/>
  <circle cx="92" cy="92" r="6" fill="#28c840"/>
  <text x="550" y="97" text-anchor="middle" font-size="12" fill="#8b949e" font-weight="600">Late 2015 iMac · macOS Host</text>

  <!-- ── UTM Hypervisor frame ── -->
  <rect x="55" y="122" width="990" height="520" rx="10" ry="10" fill="url(#utmGrad)" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- UTM label badge -->
  <rect x="55" y="113" width="130" height="22" rx="4" fill="#1f6feb"/>
  <text x="120" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">UTM Hypervisor</text>

  <!-- ── Internal Network bar ── -->
  <rect x="80" y="148" width="940" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="550" y="169" text-anchor="middle" font-size="12" font-weight="600" fill="#4493f8">Internal Network · 192.168.64.0/24</text>
  <!-- Network line decorations -->
  <line x1="95" y1="164" x2="200" y2="164" stroke="#4493f8" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="900" y1="164" x2="1005" y2="164" stroke="#4493f8" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- ══════════════════════════════════════════
       VM 1 — Wazuh Server (centre, prominent)
  ══════════════════════════════════════════ -->
  <rect x="380" y="195" width="340" height="290" rx="10" fill="url(#wazuhVmGrad)" stroke="#3fb950" stroke-width="2" filter="url(#shadow)"/>
  <!-- VM header -->
  <rect x="380" y="195" width="340" height="40" rx="10" ry="10" fill="#1f3a1f"/>
  <rect x="380" y="215" width="340" height="20" fill="#1f3a1f"/>
  <!-- Server icon -->
  <rect x="394" y="203" width="22" height="16" rx="2" fill="#3fb950" opacity="0.8"/>
  <line x1="394" y1="207" x2="416" y2="207" stroke="#0d1117" stroke-width="1.5"/>
  <line x1="394" y1="211" x2="416" y2="211" stroke="#0d1117" stroke-width="1.5"/>
  <circle cx="412" cy="215" r="2" fill="#0d1117"/>
  <text x="550" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#3fb950">wazuh-server</text>
  <text x="550" y="234" text-anchor="middle" font-size="11" fill="#7d8590">Ubuntu 22.04 LTS · 192.168.64.4</text>

  <!-- Wazuh components inside server VM -->
  <rect x="400" y="248" width="300" height="38" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1" opacity="0.9"/>
  <text x="550" y="263" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">Wazuh Manager</text>
  <text x="550" y="278" text-anchor="middle" font-size="10" fill="#7d8590">Agent registration · Rule engine · Alerting</text>

  <rect x="400" y="296" width="300" height="38" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1" opacity="0.9"/>
  <text x="550" y="311" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">Wazuh Indexer</text>
  <text x="550" y="326" text-anchor="middle" font-size="10" fill="#7d8590">OpenSearch · Log storage &amp; search</text>

  <rect x="400" y="344" width="300" height="38" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1" opacity="0.9"/>
  <text x="550" y="359" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">Wazuh Dashboard</text>
  <text x="550" y="374" text-anchor="middle" font-size="10" fill="#7d8590">Web UI · MITRE ATT&amp;CK · Analytics</text>

  <!-- Wazuh version badge -->
  <rect x="449" y="395" width="202" height="24" rx="12" fill="#1f3a1f" stroke="#3fb950" stroke-width="1"/>
  <text x="550" y="411" text-anchor="middle" font-size="11" fill="#3fb950" font-weight="600">Wazuh 4.7.5 All-in-One</text>

  <!-- Connection point (top of server VM to network) -->
  <line x1="550" y1="180" x2="550" y2="195" stroke="#3fb950" stroke-width="2"/>
  <circle cx="550" cy="178" r="4" fill="#3fb950" filter="url(#subtleGlow)"/>

  <!-- ══════════════════════════════════════════
       VM 2 — bebzylab-dc (left)
  ══════════════════════════════════════════ -->
  <rect x="80" y="200" width="270" height="255" rx="10" fill="url(#winVmGrad)" stroke="#4493f8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="200" width="270" height="40" rx="10" ry="10" fill="#1a1f3a"/>
  <rect x="80" y="220" width="270" height="20" fill="#1a1f3a"/>
  <!-- Windows icon simplified -->
  <g transform="translate(94, 205)">
    <rect x="0" y="0" width="9" height="9" fill="#4493f8" opacity="0.9"/>
    <rect x="11" y="0" width="9" height="9" fill="#4493f8" opacity="0.9"/>
    <rect x="0" y="11" width="9" height="9" fill="#4493f8" opacity="0.9"/>
    <rect x="11" y="11" width="9" height="9" fill="#4493f8" opacity="0.9"/>
  </g>
  <text x="215" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#4493f8">bebzylab-dc</text>
  <text x="215" y="234" text-anchor="middle" font-size="10" fill="#7d8590">Windows Server 2022 · 192.168.64.10</text>

  <text x="215" y="260" text-anchor="middle" font-size="11" fill="#8b949e">Active Directory Domain Controller</text>
  <text x="215" y="276" text-anchor="middle" font-size="10" fill="#7d8590">bebzylab.local</text>

  <!-- AD badge -->
  <rect x="100" y="288" width="230" height="28" rx="6" fill="#12192e" stroke="#4493f8" stroke-width="1" opacity="0.8"/>
  <text x="215" y="307" text-anchor="middle" font-size="11" fill="#4493f8" font-weight="600">Active Directory DS · DNS · DHCP</text>

  <!-- Wazuh agent badge -->
  <rect x="100" y="328" width="230" height="28" rx="6" fill="#1a2318" stroke="#3fb950" stroke-width="1"/>
  <text x="215" y="347" text-anchor="middle" font-size="11" fill="#3fb950" font-weight="600">Wazuh Agent · Active</text>

  <!-- Agent events label -->
  <text x="215" y="380" text-anchor="middle" font-size="10" fill="#7d8590">Forwards: Security logs · AD events</text>
  <text x="215" y="395" text-anchor="middle" font-size="10" fill="#7d8590">Sysmon · PowerShell logs</text>

  <!-- Connection point top to network -->
  <line x1="215" y1="178" x2="215" y2="200" stroke="#4493f8" stroke-width="1.5"/>
  <circle cx="215" cy="178" r="4" fill="#4493f8" filter="url(#subtleGlow)"/>

  <!-- ══════════════════════════════════════════
       VM 3 — bebzylab-win10 (right)
  ══════════════════════════════════════════ -->
  <rect x="750" y="200" width="270" height="255" rx="10" fill="url(#winVmGrad)" stroke="#4493f8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="750" y="200" width="270" height="40" rx="10" ry="10" fill="#1a1f3a"/>
  <rect x="750" y="220" width="270" height="20" fill="#1a1f3a"/>
  <g transform="translate(764, 205)">
    <rect x="0" y="0" width="9" height="9" fill="#4493f8" opacity="0.9"/>
    <rect x="11" y="0" width="9" height="9" fill="#4493f8" opacity="0.9"/>
    <rect x="0" y="11" width="9" height="9" fill="#4493f8" opacity="0.9"/>
    <rect x="11" y="11" width="9" height="9" fill="#4493f8" opacity="0.9"/>
  </g>
  <text x="885" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#4493f8">bebzylab-win10</text>
  <text x="885" y="234" text-anchor="middle" font-size="10" fill="#7d8590">Windows 10 Pro · 192.168.64.20</text>

  <text x="885" y="260" text-anchor="middle" font-size="11" fill="#8b949e">Domain-Joined Endpoint</text>
  <text x="885" y="276" text-anchor="middle" font-size="10" fill="#7d8590">bebzylab.local</text>

  <rect x="770" y="288" width="230" height="28" rx="6" fill="#12192e" stroke="#4493f8" stroke-width="1" opacity="0.8"/>
  <text x="885" y="307" text-anchor="middle" font-size="11" fill="#4493f8" font-weight="600">Domain User · RDP Enabled</text>

  <rect x="770" y="328" width="230" height="28" rx="6" fill="#1a2318" stroke="#3fb950" stroke-width="1"/>
  <text x="885" y="347" text-anchor="middle" font-size="11" fill="#3fb950" font-weight="600">Wazuh Agent · Active</text>

  <text x="885" y="380" text-anchor="middle" font-size="10" fill="#7d8590">Forwards: Security logs · FIM events</text>
  <text x="885" y="395" text-anchor="middle" font-size="10" fill="#7d8590">Login attempts · File system changes</text>

  <line x1="885" y1="178" x2="885" y2="200" stroke="#4493f8" stroke-width="1.5"/>
  <circle cx="885" cy="178" r="4" fill="#4493f8" filter="url(#subtleGlow)"/>

  <!-- ══════════════════════════════════════════
       Data flow arrows  DC → Wazuh Server
  ══════════════════════════════════════════ -->
  <path d="M 350 310 C 365 310, 370 310, 380 310" stroke="#3fb950" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" filter="url(#subtleGlow)"/>
  <!-- label -->
  <rect x="343" y="285" width="38" height="16" rx="3" fill="#0d2818" stroke="#3fb950" stroke-width="0.8"/>
  <text x="362" y="297" text-anchor="middle" font-size="9" fill="#3fb950">Events</text>

  <!-- Data flow arrows  Win10 → Wazuh Server -->
  <path d="M 750 310 C 735 310, 730 310, 720 310" stroke="#3fb950" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" filter="url(#subtleGlow)"/>
  <rect x="720" y="285" width="38" height="16" rx="3" fill="#0d2818" stroke="#3fb950" stroke-width="0.8"/>
  <text x="739" y="297" text-anchor="middle" font-size="9" fill="#3fb950">Events</text>

  <!-- ══════════════════════════════════════════
       Security Events panel (bottom)
  ══════════════════════════════════════════ -->
  <rect x="80" y="500" width="940" height="120" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="80" y="500" width="940" height="28" rx="8" ry="8" fill="#161b22"/>
  <rect x="80" y="514" width="940" height="14" fill="#161b22"/>
  <text x="550" y="519" text-anchor="middle" font-size="12" font-weight="700" fill="#e6edf3">Security Events Detected</text>

  <!-- Event 1 — Rule 60122 Brute Force -->
  <rect x="100" y="538" width="280" height="72" rx="7" fill="url(#eventGrad)" stroke="#f78166" stroke-width="1.2"/>
  <rect x="100" y="538" width="280" height="26" rx="7" ry="7" fill="#3d1a00"/>
  <rect x="100" y="552" width="280" height="12" fill="#3d1a00"/>
  <text x="240" y="555" text-anchor="middle" font-size="11" font-weight="700" fill="#f78166">Rule 60122 · Level 10 · CRITICAL</text>
  <text x="240" y="574" text-anchor="middle" font-size="11" fill="#e6edf3" font-weight="600">Brute Force Attack</text>
  <text x="240" y="590" text-anchor="middle" font-size="10" fill="#7d8590">Multiple failed logins on bebzylab-win10</text>
  <text x="240" y="603" text-anchor="middle" font-size="10" fill="#f78166">MITRE T1078 · T1531</text>

  <!-- Event 2 — Rule 60109 AD User Creation -->
  <rect x="410" y="538" width="280" height="72" rx="7" fill="#1f1a00" stroke="#e3b341" stroke-width="1.2"/>
  <rect x="410" y="538" width="280" height="26" rx="7" ry="7" fill="#3d3200"/>
  <rect x="410" y="552" width="280" height="12" fill="#3d3200"/>
  <text x="550" y="555" text-anchor="middle" font-size="11" font-weight="700" fill="#e3b341">Rule 60109 · Level 8 · HIGH</text>
  <text x="550" y="574" text-anchor="middle" font-size="11" fill="#e6edf3" font-weight="600">AD User Account Created</text>
  <text x="550" y="590" text-anchor="middle" font-size="10" fill="#7d8590">HackedUser created via PowerShell on DC</text>
  <text x="550" y="603" text-anchor="middle" font-size="10" fill="#e3b341">MITRE T1098 · Persistence</text>

  <!-- Event 3 — Rule 554 FIM -->
  <rect x="720" y="538" width="280" height="72" rx="7" fill="#001a1f" stroke="#58a6ff" stroke-width="1.2"/>
  <rect x="720" y="538" width="280" height="26" rx="7" ry="7" fill="#003040"/>
  <rect x="720" y="552" width="280" height="12" fill="#003040"/>
  <text x="860" y="555" text-anchor="middle" font-size="11" font-weight="700" fill="#58a6ff">Rule 554 · Level 5 · MEDIUM</text>
  <text x="860" y="574" text-anchor="middle" font-size="11" fill="#e6edf3" font-weight="600">FIM — File Added to System</text>
  <text x="860" y="590" text-anchor="middle" font-size="10" fill="#7d8590">secret-passwords.txt on Desktop (win10)</text>
  <text x="860" y="603" text-anchor="middle" font-size="10" fill="#58a6ff">MITRE T1565 · Data Manipulation</text>

  <!-- arrows from server down to event boxes -->
  <line x1="480" y1="485" x2="240" y2="538" stroke="#f78166" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="550" y1="485" x2="550" y2="538" stroke="#e3b341" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="620" y1="485" x2="860" y2="538" stroke="#58a6ff" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- iMac stand (decorative bottom) -->
  <rect x="460" y="665" width="180" height="16" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <rect x="510" y="656" width="80" height="14" rx="2" fill="#21262d" stroke="#30363d" stroke-width="1"/>

  <!-- Footer -->
  <text x="550" y="750" text-anchor="middle" font-size="11" fill="#484f58">github.com/hmuzazi-cpu/bebzylab-homelab · Wazuh SIEM Lab · bebzylab.local</text>
</svg>
