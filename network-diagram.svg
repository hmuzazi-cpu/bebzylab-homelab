<svg width="100%" viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BebzyLab network topology diagram</title>
  <desc>iMac running UTM hosts two VMs: a Windows Server 2022 Domain Controller and a Windows 10 Pro client, connected via a shared virtual network on the bebzylab.local domain.</desc>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6ab0f5"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Outer container: iMac UTM host (dashed) -->
  <rect x="15" y="15" width="770" height="530" rx="20"
        fill="#252523" stroke="#888" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="38" y="47" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#c8c6b8">iMac (UTM host)</text>
  <text x="38" y="64" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#888">macOS Sequoia</text>

  <!-- DC VM -->
  <rect x="38" y="85" width="288" height="365" rx="14"
        fill="#0b3470" stroke="#6ab0f5" stroke-width="0.75"/>
  <text x="182" y="117" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="600" fill="#cce5fc">bebzylab-dc</text>
  <text x="182" y="135" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#6ab0f5">Windows Server 2022</text>

  <rect x="60" y="153" width="244" height="30" rx="6"
        fill="#1c1868" stroke="#a09de0" stroke-width="0.5"/>
  <text x="182" y="173" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#c4c0f0">AD DS — domain controller</text>

  <rect x="60" y="191" width="244" height="30" rx="6"
        fill="#1c1868" stroke="#a09de0" stroke-width="0.5"/>
  <text x="182" y="211" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#c4c0f0">DNS — 192.168.100.10</text>

  <rect x="60" y="229" width="244" height="30" rx="6"
        fill="#1c1868" stroke="#a09de0" stroke-width="0.5"/>
  <text x="182" y="249" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#c4c0f0">DHCP — .50 to .150</text>

  <rect x="60" y="267" width="244" height="30" rx="6"
        fill="#1c1868" stroke="#a09de0" stroke-width="0.5"/>
  <text x="182" y="287" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#c4c0f0">GPO — lab-baseline-policy</text>

  <rect x="60" y="305" width="244" height="30" rx="6"
        fill="#1c1868" stroke="#a09de0" stroke-width="0.5"/>
  <text x="182" y="325" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#c4c0f0">Audit Logging — 4625 · 4740</text>

  <!-- Client VM -->
  <rect x="474" y="85" width="288" height="270" rx="14"
        fill="#073830" stroke="#3dd6a0" stroke-width="0.75"/>
  <text x="618" y="117" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="600" fill="#b0f0d8">bebzy-client001</text>
  <text x="618" y="135" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#3dd6a0">Windows 10 Pro</text>

  <rect x="496" y="153" width="244" height="30" rx="6"
        fill="#053828" stroke="#2db890" stroke-width="0.5"/>
  <text x="618" y="173" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#7aead8">Domain member — bebzylab.local</text>

  <rect x="496" y="191" width="244" height="30" rx="6"
        fill="#053828" stroke="#2db890" stroke-width="0.5"/>
  <text x="618" y="211" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#7aead8">192.168.100.50 (static)</text>

  <rect x="496" y="229" width="244" height="30" rx="6"
        fill="#053828" stroke="#2db890" stroke-width="0.5"/>
  <text x="618" y="249" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#7aead8">GPO applied via domain</text>

  <!-- Shared network bar -->
  <rect x="78" y="470" width="644" height="58" rx="10"
        fill="#053828" stroke="#3dd6a0" stroke-width="0.75"/>
  <text x="400" y="492" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#7aead8">Shared virtual network</text>
  <text x="400" y="512" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#3dd6a0">192.168.100.0/24 — bebzylab.local</text>

  <!-- Dashed connector: DC to network bar -->
  <line x1="182" y1="450" x2="182" y2="468"
        stroke="#888" stroke-width="1.5" stroke-dasharray="5 4"
        marker-end="url(#arrow-gray)"/>

  <!-- Dashed connector: Client to network bar -->
  <line x1="618" y1="355" x2="618" y2="468"
        stroke="#888" stroke-width="1.5" stroke-dasharray="5 4"
        marker-end="url(#arrow-gray)"/>

  <!-- Bidirectional dashed arrow: DC to Client -->
  <line x1="328" y1="248" x2="472" y2="248"
        stroke="#6ab0f5" stroke-width="1.2" stroke-dasharray="5 4"
        marker-start="url(#arrow-blue)"
        marker-end="url(#arrow-blue)"/>
  <text x="400" y="237" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#9dc8f0">AD auth / DNS / GPO</text>

</svg>
